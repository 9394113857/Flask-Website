# ============================================================
# 🚀 CI PIPELINE - FLASK WEBSITE SERVICE
#
# Workflow:
#
# Normal push:
#       ✅ Install dependencies
#       ✅ Run tests
#
# Pull Request:
#       ✅ Install dependencies
#       ✅ Run tests
#
# Version tag:
#
#       v1.0.0
#       v1.0.1
#
#       ✅ Run tests
#       ✅ Build Docker image
#       ✅ Push version image
#       ✅ Push latest image
#
# Docker push NEVER happens on normal commits.
#
# ============================================================


name: 🚀 CI Flask Website Service


# ============================================================
# EVENTS
# ============================================================

on:


  # ----------------------------------------------------------
  # Every branch push
  # ----------------------------------------------------------

  push:

    branches:

      - "**"


    tags:

      - "v*"



  # ----------------------------------------------------------
  # Pull requests
  # ----------------------------------------------------------

  pull_request:



  # ----------------------------------------------------------
  # Manual trigger
  # ----------------------------------------------------------

  workflow_dispatch:




# ============================================================
# JOBS
# ============================================================


jobs:



# ============================================================
# 🧪 TEST JOB
#
# Runs for every push and PR
#
# ============================================================


  test:


    name: 🧪 Application Tests


    runs-on: ubuntu-latest



    steps:


      # ------------------------------------------------------
      # Checkout code
      # ------------------------------------------------------

      - name: 📥 Checkout Repository

        uses: actions/checkout@v4




      # ------------------------------------------------------
      # Python setup
      # ------------------------------------------------------

      - name: 🐍 Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"




      # ------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------

      - name: 📦 Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install pytest




      # ------------------------------------------------------
      # Debug project structure
      #
      # Helps find import problems
      #
      # ------------------------------------------------------

      - name: 🔍 Show Project Structure

        run: |

          pwd

          ls -la

          find . -maxdepth 2 -type d




      # ------------------------------------------------------
      # Run Flask tests
      # ------------------------------------------------------

      - name: 🧪 Run Tests

        env:

          PYTHONPATH: .


        run: |

          pytest -v





# ============================================================
# 🐳 DOCKER RELEASE JOB
#
# ONLY runs when version tag created
#
# Example:
#
# v1.0.0
#
# ============================================================


  docker-release:


    name: 🐳 Build And Push Docker Image


    needs: test


    if: startsWith(github.ref, 'refs/tags/v')


    runs-on: ubuntu-latest



    steps:



      # ------------------------------------------------------
      # Checkout
      # ------------------------------------------------------

      - name: 📥 Checkout Repository

        uses: actions/checkout@v4





      # ------------------------------------------------------
      # Docker Hub login
      # ------------------------------------------------------

      - name: 🔐 Docker Hub Login

        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKERHUB_USERNAME }}

          password: ${{ secrets.DOCKERHUB_TOKEN }}






      # ------------------------------------------------------
      # Extract Git tag
      #
      # refs/tags/v1.0.0
      #
      # becomes:
      #
      # v1.0.0
      #
      # ------------------------------------------------------

      - name: 🏷️ Get Release Version

        run: |

          VERSION=${GITHUB_REF#refs/tags/}

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "Release version: $VERSION"






      # ------------------------------------------------------
      # Build Docker image
      #
      # IMPORTANT:
      # Keep "." at the end
      #
      # ------------------------------------------------------

      - name: 🐳 Build Docker Image

        run: |

          docker build -t pythoncodelife/flask-website-service:${VERSION} .






      # ------------------------------------------------------
      # Push version image
      #
      # Example:
      #
      # flask-website-service:v1.0.0
      #
      # ------------------------------------------------------

      - name: 📤 Push Version Image

        run: |

          docker push pythoncodelife/flask-website-service:${VERSION}







      # ------------------------------------------------------
      # Create latest tag
      #
      # latest always points to newest release
      #
      # ------------------------------------------------------

      - name: 🏷️ Create Latest Tag

        run: |

          docker tag \
          pythoncodelife/flask-website-service:${VERSION} \
          pythoncodelife/flask-website-service:latest






      # ------------------------------------------------------
      # Push latest image
      #
      # ------------------------------------------------------

      - name: 📤 Push Latest Image

        run: |

          docker push pythoncodelife/flask-website-service:latest